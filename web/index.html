<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw — AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --border: #252b38;
      --accent: #6c8eff;
      --accent2: #a78bfa;
      --text: #e2e6f0;
      --muted: #6b7280;
      --user-bg: #1e2b4a;
      --ai-bg: #161a23;
      --radius: 14px;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.65;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(108, 142, 255, .3);
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .model-badge {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
      transition: background .3s, box-shadow .3s;
      margin-left: 8px;
    }

    #status-dot.disconnected {
      background: #f87171;
      box-shadow: 0 0 8px #f87171;
    }

    #status-dot.connecting {
      background: #facc15;
      box-shadow: 0 0 8px #facc15;
    }

    /* ── Chat area ───────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar {
      width: 5px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    /* ── Message bubbles ─────────────────────────────────────── */
    .msg-row {
      display: flex;
      padding: 0 20px;
      animation: fadeUp .18s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .msg-row.ai {
      justify-content: flex-start;
    }

    .msg-row.system {
      justify-content: center;
    }

    .bubble {
      max-width: min(680px, 88%);
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(108, 142, 255, .25);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .msg-row.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-row.system .bubble {
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      border: none;
      padding: 4px 0;
    }

    /* ── Streaming cursor ────────────────────────────────────── */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: var(--accent);
      border-radius: 2px;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink .7s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ── Code blocks ─────────────────────────────────────────── */
    .bubble code {
      font-family: var(--mono);
      font-size: 13px;
      background: rgba(255, 255, 255, .06);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .bubble pre {
      background: #0a0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    /* ── Input area ──────────────────────────────────────────── */
    #input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 142, 255, .12);
    }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      line-height: 1.6;
      resize: none;
      max-height: 200px;
      min-height: 24px;
      overflow-y: auto;
    }

    #msgInput::placeholder {
      color: var(--muted);
    }

    #sendBtn {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .2s, transform .1s;
    }

    #sendBtn:hover {
      opacity: .9;
    }

    #sendBtn:active {
      transform: scale(.93);
    }

    #sendBtn:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none;
    }

    #sendBtn svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
      user-select: none;
      pointer-events: none;
    }

    #empty-state .icon {
      font-size: 52px;
      filter: grayscale(.3);
    }

    #empty-state p {
      font-size: 15px;
      font-weight: 500;
    }

    #empty-state small {
      font-size: 13px;
      opacity: .6;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">🦅</div>
    <h1>OpenClaw</h1>
    <span id="model-badge" class="model-badge">connecting…</span>
    <div id="status-dot" class="connecting" title="WebSocket status"></div>
  </header>

  <div id="messages">
    <div id="empty-state">
      <div class="icon">🦅</div>
      <p>OpenClaw is ready</p>
      <small>Send a message to start chatting</small>
    </div>
  </div>

  <div id="input-area">
    <div class="input-box">
      <textarea id="msgInput" rows="1"
        placeholder="Message OpenClaw… (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="sendBtn" disabled title="Send">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
    <p class="hint">OpenClaw · ws://127.0.0.1:18789</p>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────────────
    const WS_URL = 'ws://127.0.0.1:18789/ws';
    const RECONNECT = 2500; // ms between reconnect attempts
    const SESSION_ID = 'webchat-' + Math.random().toString(36).slice(2, 10);

    // ── State ─────────────────────────────────────────────────────
    let ws = null;
    let currentAiBubble = null; // bubble element being streamed into
    let reconnectTimer = null;

    // ── DOM refs ───────────────────────────────────────────────────
    const msgList = document.getElementById('messages');
    const emptyState = document.getElementById('empty-state');
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('status-dot');
    const modelBadge = document.getElementById('model-badge');

    // ── WebSocket ─────────────────────────────────────────────────
    function connect() {
      setStatus('connecting');
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus('connected');
        sendBtn.disabled = false;
        modelBadge.textContent = 'connected';
        appendSystem('Connected to OpenClaw ✓');
      };

      ws.onclose = () => {
        setStatus('disconnected');
        sendBtn.disabled = true;
        modelBadge.textContent = 'reconnecting…';
        finaliseStream(); // close any open streaming bubble
        appendSystem('Connection lost — reconnecting…');
        reconnectTimer = setTimeout(connect, RECONNECT);
      };

      ws.onerror = () => {
        // onclose fires after onerror, so just log
        console.warn('[openclaw] websocket error');
      };

      ws.onmessage = (evt) => {
        try {
          const envelope = JSON.parse(evt.data);
          if (envelope.type !== 'message') return;
          const payload = envelope.payload;  // already parsed — part of the outer JSON object
          handleChunk(payload);
        } catch (e) {
          console.error('[openclaw] parse error', e, evt.data);
        }
      };
    }

    // ── Message handling ───────────────────────────────────────────
    // payload = { session_id, text, streaming }
    function handleChunk({ text, streaming }) {
      if (!currentAiBubble) {
        hideEmpty();
        currentAiBubble = appendBubble('ai', '');
      }

      // Append text (strip trailing cursor first)
      const cursor = currentAiBubble.querySelector('.cursor');
      if (cursor) cursor.remove();

      currentAiBubble.textContent += text;
      renderCodeBlocks(currentAiBubble);

      if (streaming) {
        // Re-add blinking cursor
        const c = document.createElement('span');
        c.className = 'cursor';
        currentAiBubble.appendChild(c);
      } else {
        finaliseStream();
      }

      scrollToBottom();
    }

    function finaliseStream() {
      if (!currentAiBubble) return;
      const cursor = currentAiBubble.querySelector('.cursor');
      if (cursor) cursor.remove();
      currentAiBubble = null;
    }

    // ── Sending ────────────────────────────────────────────────────
    function sendMessage() {
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      hideEmpty();
      appendBubble('user', text);
      input.value = '';
      autoResize();
      scrollToBottom();

      ws.send(JSON.stringify({ session_id: SESSION_ID, text }));
    }

    // ── UI helpers ────────────────────────────────────────────────
    function appendBubble(type, text) {
      const row = document.createElement('div');
      row.className = `msg-row ${type}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      msgList.appendChild(row);
      return bubble;
    }

    function appendSystem(text) {
      const row = document.createElement('div');
      row.className = 'msg-row system';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      msgList.appendChild(row);
      scrollToBottom();
    }

    // Naive code-block renderer: ```...``` → <pre><code>
    function renderCodeBlocks(el) {
      const raw = el.textContent;
      if (!raw.includes('```')) return;
      const html = raw
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code class="lang-${lang}">${escHtml(code.trim())}</code></pre>`)
        .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
        .split('\n').join('<br>');
      el.innerHTML = html;
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function hideEmpty() {
      if (emptyState.parentNode) emptyState.remove();
    }

    function scrollToBottom() {
      msgList.scrollTop = msgList.scrollHeight;
    }

    function setStatus(state) {
      statusDot.className = state === 'connected' ? '' : state;
    }

    // ── Textarea auto-resize ───────────────────────────────────────
    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    }

    // ── Events ────────────────────────────────────────────────────
    input.addEventListener('input', autoResize);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Boot ──────────────────────────────────────────────────────
    connect();
  </script>
</body>

</html>
